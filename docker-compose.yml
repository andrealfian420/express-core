services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: express-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - express-core-pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - express-core-network

  redis:
    image: redis:8.8.0
    container_name: express-core-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - express-core-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - express-core-network

  migrate:
    build:
      context: .
      target: deps
    container_name: express-core-migrate
    user: '1001:1001'
    working_dir: /app
    command: npx prisma migrate deploy
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - express-core-network

  api:
    build:
      context: .
      target: production
    container_name: express-core-api
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - .env
    ports:
      - '127.0.0.1:${PORT:-3001}:${PORT:-3001}'
    volumes:
      - ./client/storage/public/uploads:/app/client/storage/public/uploads
      - ./client/storage/logs:/app/client/storage/logs
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:${PORT:-3001}/api/v1/health/ready',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - express-core-network

  worker:
    build:
      context: .
      target: production
    container_name: express-core-worker
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ['node', 'dist/jobs/run-workers.js']
    env_file:
      - .env
    healthcheck:
      test: ['CMD', 'find', '/tmp/worker-health', '-mmin', '-1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - express-core-network

networks:
  express-core-network:
    name: express-core-network

volumes:
  express-core-pgdata:
    name: express-core-pgdata
  express-core-redisdata:
    name: express-core-redisdata
