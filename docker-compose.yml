services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: postgre18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-db_express}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgredata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  migrate:
    build:
      context: .
      target: deps
    container_name: express-migrate
    working_dir: /app
    command: npx prisma migrate deploy
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  api:
    build:
      context: .
      target: production
    container_name: express-core-api
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - '127.0.0.1:${PORT:-3001}:${PORT:-3001}'
    volumes:
      - ./client/storage/public/uploads:/app/client/storage/public/uploads
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:${PORT:-3001}/api/v1/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 128M

  worker:
    build:
      context: .
      target: production
    container_name: express-core-worker
    restart: unless-stopped
    command: ['node', 'dist/jobs/run-workers.js']
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  postgredata:
    name: postgredata
  redisdata:
    name: redisdata
